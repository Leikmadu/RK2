name: CI Build and Test

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest] 

    runs-on: ${{ matrix.os}}
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure CMake with tests
      run: cmake -B build -DBUILD_TESTS=ON
    
    - name: Build
      run: cmake --build build
    
    - name: Run tests
      working-directory: build
      run: ctest --verbose
    
    - name: Build DEB package(Linux)
      if: matrix.os == 'ubuntu-latest' && startsWith(github.ref, 'refs/tags/')
      run: |
        cd build
        cpack -G DEB
    - name: Build DEB package(Windows)
      if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
      run: |
        cd build
        cpack -G NSIS
    
    - name: Upload Linux DEB artifact
      if: matrix.os == 'ubuntu-latest' && startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: deb-package
        path: build/*.deb
        
    - name: Upload Windows installer artifact
      if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: build/*.exe

  create-release:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - name: Download ALL artifact
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: 
          artifacts/deb-package/*.deb
          artifacts/windows.installer/*.exe
        draft: false
        prerelease: false
        generate_release_notes: true
