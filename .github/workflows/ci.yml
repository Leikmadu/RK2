name: CI Build and Test

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]

jobs:
  build-linux:
    name: Build Linux (DEB)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure CMake with tests
      run: cmake -B build -DBUILD_TESTS=ON
    
    - name: Build
      run: cmake --build build
    
    - name: Run tests
      working-directory: build
      run: ./monster_tests
    
    - name: Build DEB package
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cd build
        cpack -G DEB
    
    - name: Upload DEB artifact
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: linux-deb
        path: build/*.deb

  build-windows:
    name: Build Windows (EXE)
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure CMake
      run: cmake -B build
    
    - name: Build
      run: cmake --build build --config Release
    
    - name: Copy EXE for release
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        copy build\\Release\\monster_demo.exe monster_demo.exe
      shell: cmd
    
    - name: Upload EXE artifact
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: windows-exe
        path: monster_demo.exe

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/linux-deb/*.deb
          artifacts/windows-exe/*.exe
        draft: false
        prerelease: false
        generate_release_notes: true
